name: maintenance-backfill

on:
  workflow_dispatch:
    inputs:
      report:
        description: "Report target"
        required: true
        default: "both"
        type: choice
        options: [cybermed, cyberlurch, both]
      from_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      to_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      apply:
        description: "Apply state mutations (default false)"
        required: true
        default: false
        type: boolean

jobs:
  backfill-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Refuse apply mode until implementation is ready
        if: ${{ github.event.inputs.apply == 'true' }}
        run: |
          echo "Apply mode is not enabled yet; run audit-only first."
          exit 1
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run maintenance backfill tool
        run: |
          PYTHONPATH=src python -m newsagent2.maintenance.backfill_digest_stores \
            --report "${{ github.event.inputs.report }}" \
            --from-date "${{ github.event.inputs.from_date }}" \
            --to-date "${{ github.event.inputs.to_date }}" \
            --output-dir out/backfill_audit
      - name: Upload audit artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backfill-audit
          path: out/backfill_audit
