name: NewsAgent2 daily

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: "daily, weekly, monthly, yearly, or all"
        required: false
        default: "daily"
      lookback_hours:
        description: "Override lookback window in hours"
        required: false
        default: ""
      year_in_review_year:
        description: "Optional year for yearly runs"
        required: false
        default: ""
      which_report:
        description: "cyberlurch, cybermed, or both"
        required: false
        default: "cybermed"
      email_mode:
        description: "none, test, or real"
        required: false
        default: "none"
      cyberlurch_channels_file:
        description: "Cyberlurch channels file override"
        required: false
        default: ""
      managed_transcript_provider:
        description: "default, none, transcriptapi, supadata, or generic"
        required: false
        default: "default"
  schedule:
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"

permissions:
  contents: write

concurrency:
  group: newsagent2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-24.04
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_TRANSCRIPT_API_KEY: ${{ secrets.YOUTUBE_TRANSCRIPT_API_KEY }}
      TEST_RECIPIENTS_CONFIG_JSON: ${{ secrets.TEST_RECIPIENTS_CONFIG_JSON }}
      RECIPIENTS_CONFIG_JSON_REAL: ${{ secrets.RECIPIENTS_CONFIG_JSON }}
      RECIPIENTS_JSON_REAL: ${{ secrets.RECIPIENTS_JSON }}
      RECIPIENTS_JSON_CYBERLURCH_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERLURCH }}
      RECIPIENTS_JSON_CYBERLURCH_DAILY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERLURCH_DAILY }}
      RECIPIENTS_JSON_CYBERLURCH_WEEKLY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERLURCH_WEEKLY }}
      RECIPIENTS_JSON_CYBERLURCH_MONTHLY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERLURCH_MONTHLY }}
      RECIPIENTS_JSON_CYBERMED_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERMED }}
      RECIPIENTS_JSON_CYBERMED_DAILY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERMED_DAILY }}
      RECIPIENTS_JSON_CYBERMED_WEEKLY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERMED_WEEKLY }}
      RECIPIENTS_JSON_CYBERMED_MONTHLY_REAL: ${{ secrets.RECIPIENTS_JSON_CYBERMED_MONTHLY }}
      REPORT_DIR: out
      RUN_LOG_PATH: out/run.log

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute plan
        id: plan
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ github.event.inputs.report_mode }}"
            which="${{ github.event.inputs.which_report }}"
          else
            which="both"
            dow=$(TZ=Europe/Stockholm date +%u)
            dom=$(TZ=Europe/Stockholm date +%d)
            month=$(TZ=Europe/Stockholm date +%m)
            modes=()
            if [ "$dom" = "01" ]; then modes+=("monthly"); if [ "$month" = "01" ]; then modes+=("yearly"); fi; fi
            if [ "$dow" -ge 1 ] && [ "$dow" -le 5 ]; then modes+=("daily"); fi
            if [ "$dow" = "5" ]; then modes+=("weekly"); fi
            mode="${modes[*]}"
          fi
          case "$which" in cyberlurch|cybermed|both) ;; *) which="cybermed" ;; esac
          case "$mode" in all) run_modes="daily weekly monthly yearly" ;; daily|weekly|monthly|yearly) run_modes="$mode" ;; *) run_modes="daily" ;; esac
          echo "run_modes=$run_modes" >> "$GITHUB_OUTPUT"
          echo "which_report=$which" >> "$GITHUB_OUTPUT"
          echo "Run plan: $run_modes / $which"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run reports
        env:
          RUN_MODES: ${{ steps.plan.outputs.run_modes }}
          RUN_WHICH_REPORT: ${{ steps.plan.outputs.which_report }}
          LOOKBACK_HOURS_INPUT: ${{ github.event.inputs.lookback_hours }}
          EMAIL_MODE_INPUT: ${{ github.event.inputs.email_mode }}
          YEAR_IN_REVIEW_YEAR_INPUT: ${{ github.event.inputs.year_in_review_year }}
          CYBERLURCH_CHANNELS_FILE_INPUT: ${{ github.event.inputs.cyberlurch_channels_file }}
          MANAGED_TRANSCRIPT_PROVIDER_INPUT: ${{ github.event.inputs.managed_transcript_provider }}
        run: |
          set -euo pipefail
          rm -rf out
          mkdir -p out
          : > "$RUN_LOG_PATH"
          exec > >(tee -a "$RUN_LOG_PATH") 2>&1

          export OPENAI_MODEL="${OPENAI_MODEL:-gpt-4.1}"
          export OPENAI_MODEL_CYBERLURCH_CHUNKS="${OPENAI_MODEL_CYBERLURCH_CHUNKS:-gpt-5-mini}"
          export OPENAI_MODEL_CYBERLURCH_OVERVIEW="${OPENAI_MODEL_CYBERLURCH_OVERVIEW:-gpt-4.1}"
          export OPENAI_MODEL_CYBERLURCH_DEEPDIVE="${OPENAI_MODEL_CYBERLURCH_DEEPDIVE:-gpt-4.1}"
          export OPENAI_MODEL_PUBMED_DEEPDIVE="${OPENAI_MODEL_PUBMED_DEEPDIVE:-gpt-4.1}"
          export NCBI_TOOL="NewsAgent2"
          export NCBI_EMAIL="newsagent@cyberlurch.com"
          export UNPAYWALL_EMAIL="newsagent@cyberlurch.com"
          export PUBMED_DATE_TYPE="pdat"
          export PUBMED_DEEPDIVE_USE_PMC_OA_FULLTEXT="true"
          export PUBMED_DEEPDIVE_USE_UNPAYWALL_FULLTEXT="true"
          export YOUTUBE_API_METADATA="1"
          export YOUTUBE_TRANSCRIPT_PROVIDER="${MANAGED_TRANSCRIPT_PROVIDER_INPUT:-default}"
          if [ "$YOUTUBE_TRANSCRIPT_PROVIDER" = "default" ] || [ -z "$YOUTUBE_TRANSCRIPT_PROVIDER" ]; then export YOUTUBE_TRANSCRIPT_PROVIDER="transcriptapi"; fi
          export MANAGED_TRANSCRIPT_LANGS="de,en,sv"
          export MANAGED_TRANSCRIPT_MIN_CHARS="300"
          export MANAGED_TRANSCRIPT_MAX_VIDEOS_PER_RUN="75"
          export CYBERMED_QA_REPLAY_MODE="0"
          export CYBERMED_DIGEST_STORE_OVERWRITE="0"
          export CYBERMED_DIGEST_BACKFILL_MODE="0"
          export CYBERMED_WEEKLY_QA_FIXTURE_MODE="0"
          export CYBERMED_HEAVY_AUDIT_MODE="0"
          export CYBERMED_MAX_ITEMS_PER_CHANNEL="25"
          export FOAMED_AUDIT="1"
          export FOAMED_AUDIT_CHECK_DISABLED="1"
          export FOAMED_ARTICLE_FETCH="1"
          export FOAMED_ARTICLE_FETCH_MAX_PER_RUN="40"
          export LOOKBACK_HOURS_OVERRIDE="${LOOKBACK_HOURS_INPUT:-}"
          export YEAR_IN_REVIEW_YEAR="${YEAR_IN_REVIEW_YEAR_INPUT:-}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then email_mode="${EMAIL_MODE_INPUT:-none}"; else email_mode="real"; fi
          case "$email_mode" in
            none)
              export SEND_EMAIL=0
              unset RECIPIENTS_CONFIG_JSON RECIPIENTS_JSON
              unset RECIPIENTS_JSON_CYBERLURCH RECIPIENTS_JSON_CYBERLURCH_DAILY RECIPIENTS_JSON_CYBERLURCH_WEEKLY RECIPIENTS_JSON_CYBERLURCH_MONTHLY
              unset RECIPIENTS_JSON_CYBERMED RECIPIENTS_JSON_CYBERMED_DAILY RECIPIENTS_JSON_CYBERMED_WEEKLY RECIPIENTS_JSON_CYBERMED_MONTHLY
              ;;
            test)
              export SEND_EMAIL=1
              export RECIPIENTS_CONFIG_JSON="${TEST_RECIPIENTS_CONFIG_JSON:-}"
              ;;
            real)
              export SEND_EMAIL=1
              export RECIPIENTS_CONFIG_JSON="${RECIPIENTS_CONFIG_JSON_REAL:-}"
              export RECIPIENTS_JSON="${RECIPIENTS_JSON_REAL:-}"
              export RECIPIENTS_JSON_CYBERLURCH="${RECIPIENTS_JSON_CYBERLURCH_REAL:-}"
              export RECIPIENTS_JSON_CYBERLURCH_DAILY="${RECIPIENTS_JSON_CYBERLURCH_DAILY_REAL:-}"
              export RECIPIENTS_JSON_CYBERLURCH_WEEKLY="${RECIPIENTS_JSON_CYBERLURCH_WEEKLY_REAL:-}"
              export RECIPIENTS_JSON_CYBERLURCH_MONTHLY="${RECIPIENTS_JSON_CYBERLURCH_MONTHLY_REAL:-}"
              export RECIPIENTS_JSON_CYBERMED="${RECIPIENTS_JSON_CYBERMED_REAL:-}"
              export RECIPIENTS_JSON_CYBERMED_DAILY="${RECIPIENTS_JSON_CYBERMED_DAILY_REAL:-}"
              export RECIPIENTS_JSON_CYBERMED_WEEKLY="${RECIPIENTS_JSON_CYBERMED_WEEKLY_REAL:-}"
              export RECIPIENTS_JSON_CYBERMED_MONTHLY="${RECIPIENTS_JSON_CYBERMED_MONTHLY_REAL:-}"
              ;;
            *) export SEND_EMAIL=0 ;;
          esac
          echo "Email mode: $email_mode"

          for mode in $RUN_MODES; do
            echo "--- Running cadence: $mode (which_report=$RUN_WHICH_REPORT) ---"
            export REPORT_MODE="$mode"
            if [ "$RUN_WHICH_REPORT" = "both" ] || [ "$RUN_WHICH_REPORT" = "cyberlurch" ]; then
              CHFILE="data/channels.json"
              if [ -n "${CYBERLURCH_CHANNELS_FILE_INPUT:-}" ]; then CHFILE="$CYBERLURCH_CHANNELS_FILE_INPUT"; fi
              REPORT_KEY=cyberlurch REPORT_TITLE="The Cyberlurch Report" REPORT_SUBJECT="The Cyberlurch Report" REPORT_LANGUAGE=en REPORT_PROFILE=general SEND_EMPTY_REPORT_EMAIL="1" python -m src.newsagent2.main --channels "$CHFILE" --hours 24
            fi
            if [ "$RUN_WHICH_REPORT" = "both" ] || [ "$RUN_WHICH_REPORT" = "cybermed" ]; then
              REPORT_KEY=cybermed REPORT_TITLE="Cybermed Report" REPORT_SUBJECT="Cybermed Report" REPORT_LANGUAGE=en REPORT_PROFILE=medical SEND_EMPTY_REPORT_EMAIL="1" python -m src.newsagent2.main --channels "data/cybermed_channels.json" --hours 24
            fi
          done

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: newsagent2-reports-${{ github.run_id }}
          path: |
            out/*.md
            out/*diagnostics*.json
            out/*metadata*.json
            out/run.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit updated state files if changed
        if: contains(steps.plan.outputs.run_modes, 'daily') || contains(steps.plan.outputs.run_modes, 'monthly')
        run: |
          set -euo pipefail
          FILES=()
          for f in state/processed_items.json state/rollups.json state/cyberlurch_digests.json state/cybermed_daily_digests.json state/youtube_content_cache.json; do
            if [ -f "$f" ]; then FILES+=("$f"); fi
          done
          if [ "${#FILES[@]}" -eq 0 ]; then exit 0; fi
          if [ -z "$(git status --porcelain -- "${FILES[@]}" || true)" ]; then exit 0; fi
          git config user.name "newsagent-bot"
          git config user.email "newsagent-bot@users.noreply.github.com"
          git add -A "${FILES[@]}"
          git commit -m "Update state files [skip ci]" || exit 0
          git push origin "HEAD:${GITHUB_REF_NAME}"
